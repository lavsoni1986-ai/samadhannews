  <text x="80" y="540" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#FFFFFF" fill-opacity="0.8">भारत की प्रमुख हिंदी डिजिटल न्यूज़ प्लेटफ़ॉर्म</text>
